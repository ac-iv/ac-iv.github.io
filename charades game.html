        let currentDifficulty = "easy";
        let timer;

        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;

            // Remove 'active' class from all buttons
            document.querySelectorAll('button').forEach(button => button.classList.remove('active'));

            // Add 'active' class to the clicked button
            document.getElementById(`${difficulty}Btn`).classList.add('active');
        }

        function generateRandomWord() {
            clearInterval(timer); // Clear previous timer
            startTimer(30); // Start a new 30-second timer

            const difficultyWords = words[currentDifficulty];
            const randomIndex = Math.floor(Math.random() * difficultyWords.length);
            const randomWord = difficultyWords[randomIndex];
            document.getElementById("randomWord").innerText = randomWord;
        }

        function startTimer(seconds) {
            let count = seconds;
            updateTimer(count);

            timer = setInterval(function () {
                count--;
                updateTimer(count);

                if (count <= 0) {
                    clearInterval(timer);
                    document.getElementById("randomWord").innerText = "Time's up!";
                }
            }, 1000);
        }

        function updateTimer(count) {
            document.getElementById("timer").innerText = `Time: ${count} seconds`;

        function createTeamGraphs() {
    const numTeams = document.getElementById('numTeams').value;
    const teamSection = document.getElementById('teamSection');
    const numTeamsInput = document.getElementById('numTeams');
    const numTeamsLabel = document.querySelector('label[for="numTeams"]');
    const createTeamsButton = numTeamsInput.nextElementSibling; // Assuming the button is the next sibling

    // Hide the number of teams input, label, and the create teams button
    numTeamsInput.style.display = 'none';
    numTeamsLabel.style.display = 'none';
    createTeamsButton.style.display = 'none';

    // Clear previous teams
    teamSection.innerHTML = '';

    // Create graphs for each team
    for (let i = 1; i <= numTeams; i++) {
        createTeamGraph(i);
    }
}

function createTeamGraph(teamNumber) {
    const teamSection = document.getElementById('teamSection');

    // Create a div for the team graph
    const teamGraph = document.createElement('div');
    teamGraph.className = 'teamGraph';
    teamGraph.innerHTML = `
        <h4>Team ${teamNumber}</h4>
        <p>Points: <span id="points${teamNumber}">0</span></p>
        <button class="subtractBtn" onclick="subtractPoint(${teamNumber})">-</button>
        <button class="addBtn" onclick="addPoint(${teamNumber})">+</button>
    `;

    // Append the team graph to the team section
    teamSection.appendChild(teamGraph);
}

function addPoint(teamNumber) {
    const pointsElement = document.getElementById(`points${teamNumber}`);
    let currentPoints = parseInt(pointsElement.textContent);
    currentPoints++;
    pointsElement.textContent = currentPoints;
}

function subtractPoint(teamNumber) {
    const pointsElement = document.getElementById(`points${teamNumber}`);
    let currentPoints = parseInt(pointsElement.textContent);
    if (currentPoints > 0) {
        currentPoints--;
        pointsElement.textContent = currentPoints;
    }
}
function resetPage() {

    function createTeamGraphs() {
            const numTeams = document.getElementById('numTeams').value;
            const teamSection = document.getElementById('teamSection');
            const numTeamsInput = document.getElementById('numTeams');
            const numTeamsLabel = document.querySelector('label[for="numTeams"]');
            const createTeamsButton = numTeamsInput.nextElementSibling; // Assuming the button is the next sibling

            // Hide the number of teams input, label, and the create teams button
            numTeamsInput.style.display = 'none';
            numTeamsLabel.style.display = 'none';
            createTeamsButton.style.display = 'none';

            // Clear previous teams
            teamSection.innerHTML = '';

            // Create graphs for each team
            for (let i = 1; i <= numTeams; i++) {
                createTeamGraph(i);
            }
        }

        function createTeamGraph(teamNumber) {
            const teamSection = document.getElementById('teamSection');
            const screenWidth = window.innerWidth;

            // Determine the number of columns based on screen width
            const numColumns = screenWidth < 600 ? 2 : 4;

            // Check if a new row is needed
            const isNewRow = (teamNumber - 1) % numColumns === 0;

            // Create a new row div if needed
            if (isNewRow) {
                const row = document.createElement('div');
                row.className = 'teamRow';
                teamSection.appendChild(row);
            }

            // Get the last row
            const rows = teamSection.getElementsByClassName('teamRow');
            const lastRow = rows[rows.length - 1];

            // Create a div for the team graph
            const teamGraph = document.createElement('div');
            teamGraph.className = 'teamGraph';
            teamGraph.innerHTML = `
                <h4>Team ${teamNumber}</h4>
                <p>Points: <span id="points${teamNumber}">0</span></p>
                <button class="subtractBtn" onclick="subtractPoint(${teamNumber})">-</button>
                <button class="addBtn" onclick="addPoint(${teamNumber})">+</button>
            `;

            // Append the team graph to the last row
            lastRow.appendChild(teamGraph);
        }

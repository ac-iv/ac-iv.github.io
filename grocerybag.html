</head>
<style>
    .buttoncenter{
        align-items: center;
        align-content: center;
        text-align: center;
    } .carousel img {
        width: 90%;
        text-align: center;
        align-items: center;

.carousel{

    text-align: center;

<body>
    <header>
        <a href="dooley.html">PREVIOUS</a>
        <a href="work.html">Work</a>
        <a href="cookie.html">NEXT</a>
    </header>
    <main>
        <section class="project-details">
            <h2>
Environmentally Aware Grovery Bags      </h2>            <br>

            <p>
                The vision behind the Environmentally Aware Grocery Bag is to promote reusing plastic bags by gently reminding consumers that, when disposed, the bag will harm the earth
            </p>
        </section>
        <section class="carousel-container">
            
            <div class="carousel">
                <div class="slide"><img src="img/totebag.png" height="100%" alt="Image 1"></div>
                <div class="slide"><img src="img/whitebag.png" height="100%" alt="Image 2"></div>
                <div class="slide"><img src="img/mommy.png" height="100%" alt="Image 3"></div>
               
            </div>
            <br>
            <div class="buttoncenter">
                <button id="prevBtn" class="carousel-btn" onclick="prevSlide()">❮</button>
                <button id="nextBtn" class="carousel-btn" onclick="nextSlide()">❯</button>
            </div>
        </section>

        <!-- New section for the text box -->
        <section class="text-box">
            <p id="slideText">Text for Slide 1</p>
        </section>
    </main>
    <br>
    <footer>
        <p>&copy; 2023 Avelino J. Cortina IV</p>
    </footer>
    <script>let currentSlide = 0;

        function showSlide(n) {
            const slides = document.querySelectorAll('.slide');
            const slideText = document.getElementById('slideText');
        
            if (n >= slides.length) {
                currentSlide = 0;
            } else if (n < 0) {
                currentSlide = slides.length - 1;
            } else {
                currentSlide = n;
            }
        
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = 'none';
            }
        
            slides[currentSlide].style.display = 'block';
        
            // Update the text based on the current slide
            switch (currentSlide) {
                case 0:
                    slideText.innerText = "Reusable tote bag with RESPECT YOUR MOTHER campaign logo";
                    break;
                case 1:
                    slideText.innerText = "Disposable plastic bag with RESPECT YOUR MOTHER campaign logo. This was the first bag, as it is the style which faces most dispolsal.";
                    break;
               
                    case 2:
                        slideText.innerText = "RESPECT YOUR MOTHER logo";
                        break;
                // Add more cases if you have more slides
        
            }
        }
        
        function nextSlide() {
            showSlide(currentSlide + 1);
        }
        
        function prevSlide() {
            showSlide(currentSlide - 1);
        }
        
        document.addEventListener('DOMContentLoaded', showSlide(currentSlide));
        </script>
</body>

</html>

<!DOCTYPE html>

<title>Portfolio</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 1%;
  }
  body {
    display: flex;
    justify-content: flex-start; /* Aligns children to the start of the main axis */
    min-height: 100vh;
    font-family: 'Courier New', Courier, monospace;  
  }
  .sidebar {
    background: #fff;
    padding: 20px;
    width: 250px;
  }
  .logo {
    margin-bottom: 20px;
    text-align: center;
  }
  nav {
    display: flex;
    flex-direction: column;
  }
 
  nav a {
    text-decoration: none;
    color: #333;
    padding: 10px 0;
    padding-left: 20%;
  }
  nav a:hover {
    font-weight: bold;
  }

  .portfolio {
    flex-grow: 1;
    display: grid;
    grid-template-columns: repeat(2, minmax(200px, 1fr)); /* Sets a maximum of two columns */
    gap: 20px;
    padding: 20px;
    align-items: start;
  }
  .portfolio-item {
    position: relative;
    overflow: hidden;
    font-family: 'Chocolate Smoothies', sans-serif;
                                        
  }
  .portfolio-item img {
    width: 100%;
    display: block;
    transition: transform 0.3s ease;
  }
  .portfolio-item:hover img {
    transform: scale(1.1);
  }
  .portfolio-item:hover .overlay {
    opacity: 1;
  }
  .overlay {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    opacity: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.3s ease;
  }
  .overlay-text {
    text-align: center;
    padding: 15px;
    font-size: 18px;
  }
</style>
</head>

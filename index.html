<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Avelino J. Cortina IV - Welcome</title>
    <link rel="icon" type="image/png" href="img/4x/Asset 8@4x.png">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background-image: url('your-image-url.jpg'); 
            background-size: cover; 
            background-position: center; 
        }
        @import url('https://fonts.cdnfonts.com/css/chocolate-smoothies');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-wrapper {
            background-color: rgba(255, 255, 255, 0.712);
            padding: 10%;
            border-radius: 10000px;
            transition: 0.5s;
            display: inline-block; /* To contain the img size */
        }

        .img-wrapper:hover {
            background-color: red; /* Red background on hover */
        }

        .img-wrapper img {
            width: 22rem;
            transition: transform 0.5s, filter 0.5s; /* Smooth transition for scale and filter */
        }

        .img-wrapper:hover img {
            filter: invert(100%); /* Invert colors on hover */
            transform: scale(1.1); /* Enlarge on hover */
        }

        a {
            text-transform: capitalize;
        }

        h2 {
            text-align: center;
            padding-top: 3%;
        }

        h2 img {
            width: 22rem;
        }

        h3 {
            font-size: 175%;
        }

  

    </style>
</head>
<body>
    <a href="work.html" class="img-wrapper"><img src="img/Asset 2.svg"></a>
</body>
</html>

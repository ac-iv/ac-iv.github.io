<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avelino J. Cortina IV - Welcome</title>
    <link rel="icon" type="image/png" href="img/4x/Asset 8@4x.png">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background-image: url('your-image-url.jpg');
            background-size: cover;
            background-position: center;
            font-family: 'Chocolate Smoothies', sans-serif;
            overflow: hidden; /* Prevent scrolling */
        }

        .fixed-type {
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .fixed-image {
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .img-wrapper {
            background-color: rgba(255, 255, 255, 0.712);
            padding: 25%;
            border-radius: 10000px;
            transition: 0.5s;
            display: inline-block; /* To contain the img size */
        }

        .img-wrapper:hover {
            background-color: red; /* Red background on hover */
        }

        .img-wrapper img {
            width: 10rem;
            transition: transform 0.5s, filter 0.5s; /* Smooth transition for scale and filter */
        }

        .img-wrapper:hover img {
            filter: invert(100%); /* Invert colors on hover */
            transform: scale(1.1); /* Enlarge on hover */
        }


        .typing-effect {
            color: rgb(0, 0, 0);
            font-size: 24px;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>
    <div class="fixed-type"> 
        <div class="typing-effect"></div>
    </div>
        <br>
        <div class="fixed-image">
            <a href="work.html" class="img-wrapper"><img src="img/Asset 1.svg"></a>
        </div>
    </div>
    <script>
        const text = "To enter my portfolio website, click on my face below - Avelino";
        const typingContainer = document.querySelector('.typing-effect');
        let index = 0;

        function typeText() {
            if (index < text.length) {
                typingContainer.innerHTML += text.charAt(index);
                index++;
                setTimeout(typeText, 125); // Adjust typing speed here
            }
        }

        window.onload = function() {
            typeText();
        };
    </script>
</body>
</html>

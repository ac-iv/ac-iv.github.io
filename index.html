<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avelino's Portfolio</title>
    <link rel="stylesheet" href="new.css">

    <style>
       body {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
.right-column img {
    width: 60%; }

    .right-column img:hover{
        opacity: 75%;
    }    

.right-column {
    text-align: center;
    margin-top: 10px;
}
.typed-text {
    font-size: 22px;
    margin-bottom: 20px;
}
.portfolio-buttons a {
    margin: 0 10px;
    padding: 10px;
    background-color: #e6e6e6;
    color: rgb(60, 60, 60);
    text-decoration: none;
    border-radius: 5px;
    transition: transform 0.3s ease, background-color 0.3s ease, color 0.3s ease; /* Smooth transitions for transform, background-color, and color */
    transform: scale(1); /* Initial scale */
}
.portfolio-buttons {
    margin-bottom: 20px;
}
.portfolio-buttons a:hover {
    transform: scale(1.2); /* Enlarges the button to 120% of its size */
    color: #ffffff; /* Changes text color on hover */
    background-color:#c0621b; 
    transition: transform 0.3s ease, background-color 0.3s ease, color 0.3s ease; /* Smooth transitions for transform, background-color, and color */
    transform: scale(1); /* Initial scale */
}
footer {
    margin-top: 20px;
}

    </style>
</head>
<body>
    <div class="right-column">
        <h1>
            <span class="typed-text"></span><span class="cursor">&nbsp;</span>
        </h1>
        <br>
        <br>
        <br>
      <a href="work.html">  <img src="img/mainme.png" alt="Avelino's Work" class="main-image"> </a>
        <div class="portfolio-buttons">
            <a href="work.html">Work</a>
            <a href="contact.html">Contact</a>
            <a href="about.html">About</a>
           <hide> <a href="resume.html">Resume</a></hide>
        </div>
    </div>

    <footer>
        <p>&copy; 2023 Avelino J. Cortina IV</p>
    </footer>

    <script>
        const typedTextSpan = document.querySelector(".typed-text");
        const cursorSpan = document.querySelector(".cursor");

        const textArray = ["Welcome to my Portfolio ", "-Avelino"]; // Adjusted text array
        const typingDelay = 200;
        const erasingDelay = 100;
        const newTextDelay = 2000; // Delay between current and next text
        let textArrayIndex = 0;
        let charIndex = 0;

        function type() {
            if (charIndex < textArray[textArrayIndex].length) {
                if(!cursorSpan.classList.contains("typing")) cursorSpan.classList.add("typing");
                typedTextSpan.textContent += textArray[textArrayIndex].charAt(charIndex);
                charIndex++;
                setTimeout(type, typingDelay);
            } 
            else {
                cursorSpan.classList.remove("typing");
                setTimeout(erase, newTextDelay);
            }
        }

        function erase() {
            if (charIndex > 0) {
                if(!cursorSpan.classList.contains("typing")) cursorSpan.classList.add("typing");
                typedTextSpan.textContent = textArray[textArrayIndex].substring(0, charIndex-1);
                charIndex--;
                setTimeout(erase, erasingDelay);
            } 
            else {
                cursorSpan.classList.remove("typing");
                textArrayIndex++;
                if(textArrayIndex>=textArray.length) textArrayIndex=0;
                setTimeout(type, typingDelay + 1100);
            }
        }

        document.addEventListener("DOMContentLoaded", function() { // On DOM Load initiate the effect
            if(textArray.length) setTimeout(type, newTextDelay + 250);
        });
    </script>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Posting Board</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f0f0f0;
  }

  #board {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
  }

  .poster {
    width: 200px;
    height: 200px;
    margin: 10px;
    background-color: #ffffff;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    position: relative;
    cursor: pointer;
    transition: transform 0.3s;
  }

  .poster:hover {
    transform: scale(1.05);
  }

  .highlight {
    border: 2px solid #ff7b54;
  }

  .poster img {
    width: 100%;
    height: 100%;
    border-radius: 10px;
    object-fit: cover;
  }

  .tooltip {
    position: absolute;
    background-color: #ff7b54;
    color: #ffffff;
    padding: 5px 10px;
    border-radius: 5px;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .poster:hover .tooltip {
    opacity: 1;
  }
</style>
</head>
<body>

<div id="board">
  <div class="poster" data-link="https://example.com">
    <img src="poster1.jpg" alt="Poster 1">
    <div class="tooltip">Visit Example</div>
  </div>
  <div class="poster" data-link="https://example.org">
    <img src="poster2.jpg" alt="Poster 2">
    <div class="tooltip">Visit Example</div>
  </div>
  <!-- Add more posters as needed -->
</div>

<script>
  const posters = document.querySelectorAll('.poster');

  posters.forEach(poster => {
    poster.addEventListener('mouseenter', () => {
      posters.forEach(p => p.classList.remove('highlight'));
      poster.classList.add('highlight');
    });

    poster.addEventListener('mouseleave', () => {
      poster.classList.remove('highlight');
    });

    poster.addEventListener('click', () => {
      const link = poster.getAttribute('data-link');
      if (link) {
        window.open(link, '_blank');
      }
    });
  });
</script>

</body>
</html>
